{% extends "base.html" %}

{% block content %}
<h1>Pristanišča</h1>

<table>
    <thead>
        <tr>
            <th>Pristanišče</th>
            <th>Država</th>
            <th>Regija</th>
            <th>Lokacija</th>
        </tr>
    </thead>

    <tbody>
        {% for port in ports %}
        <tr>
            <td>{{ port.port_name }}</td>
            <td>{{ port.country }}</td>
            <td>{{ port.region }}</td>
            <td>{{ port.location }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
