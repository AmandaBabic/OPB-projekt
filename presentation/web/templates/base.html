<!DOCTYPE html>
<html>
<head>
    <title>Register ladij</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background: #1f2a40;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #111;
        }

        .sidebar h2 {
            margin-top: 0;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 10px;
            margin: 3px 0;
            border-radius: 5px;
            display: block;
        }

        .sidebar a:hover {
            background: #2f3f5f;
        }

        /* CONTENT */
        .content {
            flex: 1;
            padding: 20px;
            background: #f5f6fa;
            overflow-y: auto;

            display: flex;
            flex-direction: column;
        }

        /* TOP BAR - FIX */
        .topbar {
            width: 100%;
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .topbar-right {
            margin-left: auto;   /* 🔥 KLJUČNI FIX */
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            padding: 8px 14px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #1f2a40;
            color: white;
            padding: 10px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

    <!-- LEVI MENI -->
    <div class="sidebar">
        <h2>REGISTER LADIJ</h2>

        <a href="/">Povzetek</a>
        <a href="/visits">Obiski</a>
        <a href="/ships">Ladje</a>
        <a href="/ports">Pristanišča</a>
        <a href="/countries">Države</a>
    </div>

    <!-- DESNA STRAN -->
    <div class="content">

        <!-- TOP BAR -->
        <div class="topbar">
            <div class="topbar-right">
                <span>{{ session.get('user') }}</span>
                <a href="/logout" class="logout-btn">Odjava</a>
            </div>
        </div>

        <!-- PAGE CONTENT -->
        <div class="page">
            {% block content %}{% endblock %}
        </div>

    </div>

</body>
</html>
